<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Dev | Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-secondary: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-top: 70px;
        }

        .navbar {
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
        }

        .hero {
            padding: 60px 20px;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            text-align: center;
        }

        .logo-container img {
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 20px;
            width: 120px;
            height: 120px;
            object-fit: cover;
        }

        .btn-primary {
            background-color: var(--accent);
            border: none;
            color: #0f172a;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #7dd3fc;
            transform: scale(1.05);
        }

        .card {
            background-color: var(--card);
            border: 1px solid #334155;
            color: white;
            border-radius: 20px;
            transition: 0.3s;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .badge-dev {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            font-size: 0.8rem;
        }

        footer {
            border-top: 1px solid #334155;
            padding: 40px 0;
            margin-top: 50px;
            color: var(--text-secondary);
        }

        /* Estilo para que se sienta como App */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <span class="fw-bold">ACADEMIA <span style="color: var(--accent);">DEV</span></span>
            </a>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <div class="logo-container">
                <img src="logo.png" alt="Logo">
            </div>
            <h1 class="display-5 fw-bold">Aprende Programación Real</h1>
            <p class="lead text-secondary mx-auto" style="max-width: 600px;">
                Tutoriales prácticos, código limpio y herramientas para convertirte en desarrollador profesional.
            </p>
            <div class="mt-4">
                <a href="#cursos" class="btn btn-primary btn-lg">Empezar a Aprender</a>
            </div>
        </div>
    </header>

    <main class="container py-5" id="cursos">
        <h3 class="mb-4 fw-bold text-center text-md-start">Rutas de Aprendizaje</h3>
        <div class="row g-4">
            
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 p-3">
                    <div class="card-body d-flex flex-column">
                        <div class="mb-3">
                            <span class="badge badge-dev">HTML & CSS</span>
                        </div>
                        <h4 class="card-title fw-bold">Fundamentos Web</h4>
                        <p class="text-secondary flex-grow-1">Domina la estructura y el diseño de sitios web modernos desde cero.</p>
                        <button class="btn btn-outline-light w-100 mt-3">Ver Lección</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card h-100 p-3">
                    <div class="card-body d-flex flex-column">
                        <div class="mb-3">
                            <span class="badge badge-dev">
