<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Voz - Asistente Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 900px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 15px;
            border: 1px solid #e0e0e0;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-section {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            transition: border-color 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .mic-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            }
            50% {
                box-shadow: 0 4px 30px rgba(245, 87, 108, 0.8);
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .clear-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            width: auto;
            padding: 10px 14px;
        }

        .clear-btn:hover {
            transform: scale(1.05);
        }

        .info-message {
            padding: 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            border-radius: 8px;
            color: #1565c0;
            font-size: 14px;
            margin: 10px 0;
            display: none;
        }

        .info-message.show {
            display: block;
        }

        .error-message {
            padding: 15px;
            background: #ffebee;
            border-left: 4px solid #f44336;
            border-radius: 8px;
            color: #c62828;
            font-size: 14px;
            margin: 10px 0;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 15px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 8px;
            color: #2e7d32;
            font-size: 14px;
            margin: 10px 0;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #667eea;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
            max-width: 300px;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .header h1 {
                font-size: 22px;
            }

            input[type="text"] {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <div class="avatar">🤖</div>
                IA Voz
            </h1>
            <p class="subtitle">Asistente Inteligente con Reconocimiento de Voz</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h2>¡Hola! Soy tu Asistente IA</h2>
                <p>Escribe un mensaje o usa el micrófono para comenzar la conversación</p>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <button class="mic-btn" id="micBtn" title="Reconocimiento de voz">🎤</button>
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Escribe tu pregunta aquí..." 
                    autocomplete="off"
                >
                <button id="sendBtn" title="Enviar mensaje">📤</button>
            </div>
            <div class="button-group">
                <button class="clear-btn" id="clearBtn" title="Limpiar chat">🗑️</button>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const clearBtn = document.getElementById('clearBtn');
        let isRecording = false;
        let recognition = null;

        // Inicializar Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                messageInput.placeholder = 'Escuchando...';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                messageInput.value = transcript;
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                messageInput.placeholder = 'Escribe tu pregunta aquí...';
            };

            recognition.onerror = (event) => {
                showError(`Error: ${event.error}`);
                isRecording = false;
                micBtn.classList.remove('recording');
            };
        } else {
            micBtn.disabled = true;
            micBtn.title = 'Tu navegador no soporta reconocimiento de voz';
        }

        // Base de datos de respuestas IA
        const aiResponses = {
            'hola': '¡Hola! 👋 Bienvenido a IA Voz. ¿En qué puedo ayudarte hoy?',
            'cómo estás': 'Estoy funcionando perfectamente, ¡gracias por preguntar! 😊 ¿Y tú?',
            'python': 'Python es un lenguaje de programación versátil y fácil de aprender. Se usa en desarrollo web, data science, IA y más. ¿Quieres saber algo específico sobre Python?',
            'javascript': 'JavaScript es el lenguaje de la web. Se ejecuta en navegadores y también en servidores con Node.js. Es perfecto para crear aplicaciones interactivas.',
            'html': 'HTML es el lenguaje de marcado para crear páginas web. Define la estructura del contenido usando elementos como <div>, <p>, <button>, etc.',
            'css': 'CSS se utiliza para dar estilos a los elementos HTML. Con CSS puedes controlar colores, fuentes, diseño, animaciones y mucho más.',
            'ayuda': 'Puedo ayudarte con: Preguntas sobre programación (Python, JavaScript, HTML, CSS), explicaciones de conceptos técnicos, y responder tus dudas. ¿Qué necesitas?',
            'gracias': '¡De nada! 😊 Estoy aquí para ayudarte siempre que lo necesites.',
            'adiós': '¡Hasta luego! 👋 Vuelve pronto si necesitas ayuda. ¡Que te vaya bien!',
            'quién eres': 'Soy un Asistente de IA con reconocimiento de voz. Estoy aquí para ayudarte a aprender programación y responder tus preguntas técnicas.',
            'programación': 'La programación es el arte de crear instrucciones para que las computadoras realicen tareas. Existen muchos lenguajes como Python, JavaScript, C++, Java, etc.',
            'desarrollo web': 'El desarrollo web involucra crear aplicaciones que se ejecutan en navegadores. Necesitas HTML (estructura), CSS (estilos) y JavaScript (interactividad).',
            '': 'No entendí bien. ¿Puedes reformular tu pregunta? 🤔'
        };

        // Función para obtener respuesta de IA
        function getAIResponse(message) {
            const lowerMessage = message.toLowerCase().trim();
            
            for (let key in aiResponses) {
                if (lowerMessage.includes(key)) {
                    return aiResponses[key];
                }
            }
            
            return `Interesante pregunta sobre "${message}". Aunque no tengo información específica, te recomendaría buscar en recursos de programación o preguntarme sobre Python, JavaScript, HTML o CSS. 📚`;
        }

        // Mostrar mensaje en el chat
        function displayMessage(message, isUser) {
            if (chatContainer.querySelector('.empty-state')) {
                chatContainer.innerHTML = '';
            }

            const messageEl = document.createElement('div');
            messageEl.className = `message ${isUser ? 'user' : 'bot'}`;
            messageEl.innerHTML = `<div class="message-content">${escapeHtml(message)}</div>`;
            chatContainer.appendChild(messageEl);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Mostrar indicador de escritura
        function showTypingIndicator() {
            const messageEl = document.createElement('div');
            messageEl.className = 'message bot';
            messageEl.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messageEl.id = 'typingIndicator';
            chatContainer.appendChild(messageEl);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Remover indicador de escritura
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // Escapar HTML para evitar XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Mostrar mensajes
        function showError(message) {
            console.error(message);
        }

        function showSuccess(message) {
            console.log(message);
        }

        // Enviar mensaje
        function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;

            displayMessage(message, true);
            messageInput.value = '';
            messageInput.focus();

            showTypingIndicator();
            
            setTimeout(() => {
                removeTypingIndicator();
                const response = getAIResponse(message);
                displayMessage(response, false);
            }, 1000);
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        micBtn.addEventListener('click', () => {
            if (recognition) {
                if (isRecording) {
                    recognition.stop();
                } else {
                    messageInput.value = '';
                    recognition.start();
                }
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('¿Estás seguro de que quieres limpiar el chat?')) {
                chatContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <h2>¡Hola! Soy tu Asistente IA</h2>
                        <p>Escribe un mensaje o usa el micrófono para comenzar la conversación</p>
                    </div>
                `;
                messageInput.value = '';
                messageInput.focus();
                showSuccess('Chat limpiado correctamente');
            }
        });

        // Mostrar mensaje de bienvenida
        window.addEventListener('load', () => {
            setTimeout(() => {
                displayMessage('¡Hola! 👋 Bienvenido a IA Voz. Soy tu asistente inteligente. Puedes escribir o usar el micrófono para hablar conmigo. ¿En qué puedo ayudarte?', false);
            }, 500);
        });
    </script>
</body>
</html>
